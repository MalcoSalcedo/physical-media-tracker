<!doctype html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>{% block title %}Physical Media Tracker{% endblock %}</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 2rem auto; padding: 0 1rem; }
        nav a { margin-right: 1rem; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 1rem; }
        .card { text-align: center; }
        .card img { max-width: 100%; }
        .cover-placeholder { width: 100%; aspect-ratio: 1; background: #ddd; }
        form.stacked label { display: block; margin-top: 0.75rem; }
        form.stacked input { width: 100%; padding: 0.4rem; }
        button { margin-top: 1rem; padding: 0.5rem 1rem; }
    </style>
</head>
<body>
    <nav>
        <a href="/collection">Collection</a>
        <a href="/add">Add item</a>
    </nav>
    <hr>
    {% block content %}{% endblock %}
</body>
</html>
